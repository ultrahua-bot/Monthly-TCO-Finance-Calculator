<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly TCO & Finance Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // 📌 จุดที่ 1: ตั้งค่าเริ่มต้น (Default Values) ดึงมาจากไฟล์ Excel SCG
            const [inputs, setInputs] = React.useState({
                // ข้อมูลการวิ่งทั่วไป
                kmPerDay: 438,
                daysPerMonth: 26,
                
                // ฝั่งรถน้ำมัน (ดีเซล) - อ้างอิง Hino/Isuzu
                dieselPrice: 3500000,
                dieselDownPct: 10,
                dieselInterestRate: 3.5,
                dieselTerms: 60,
                dieselConsumption: 3.0, // km/L (เทียบเท่า 0.33 L/km)
                dieselFuelPrice: 39, // THB/L
                dieselInsuranceYear: 80000,
                dieselMaintYear: 100000,

                // ฝั่งรถไฟฟ้า (EV) - อ้างอิง Foton E-mixer
                evPrice: 4000000,
                evDownPct: 15,
                evInterestRate: 3.5,
                evTerms: 60,
                evConsumption: 1.5, // kWh/km
                evElectricityPrice: 5.0, // THB/kWh
                evInsuranceYear: 120000,
                evMaintYear: 50000,
            });

            const [results, setResults] = React.useState({
                monthlyKm: 0,
                
                // ดีเซล
                dieselDownPayment: 0,
                dieselFinanceAmt: 0,
                dieselInstallment: 0,
                dieselEnergyCost: 0,
                dieselTotalMonthly: 0,
                
                // EV
                evDownPayment: 0,
                evFinanceAmt: 0,
                evInstallment: 0,
                evEnergyCost: 0,
                evTotalMonthly: 0,

                // สรุป
                savingPerMonth: 0,
            });

            React.useEffect(() => {
                const calc = () => {
                    // 1. ระยะทางรวมต่อเดือน
                    const monthlyKm = inputs.kmPerDay * inputs.daysPerMonth;

                    // --- คำนวณฝั่งรถดีเซล ---
                    const dDown = inputs.dieselPrice * (inputs.dieselDownPct / 100);
                    const dFinance = inputs.dieselPrice - dDown;
                    const dInterestTotal = dFinance * (inputs.dieselInterestRate / 100) * (inputs.dieselTerms / 12);
                    const dInstallment = (dFinance + dInterestTotal) / inputs.dieselTerms;
                    const dEnergyCost = (monthlyKm / inputs.dieselConsumption) * inputs.dieselFuelPrice;
                    const dTotalMonthly = dInstallment + dEnergyCost + (inputs.dieselInsuranceYear / 12) + (inputs.dieselMaintYear / 12);

                    // --- คำนวณฝั่งรถ EV ---
                    const eDown = inputs.evPrice * (inputs.evDownPct / 100);
                    const eFinance = inputs.evPrice - eDown;
                    const eInterestTotal = eFinance * (inputs.evInterestRate / 100) * (inputs.evTerms / 12);
                    const eInstallment = (eFinance + eInterestTotal) / inputs.evTerms;
                    const eEnergyCost = (monthlyKm * inputs.evConsumption) * inputs.evElectricityPrice;
                    const eTotalMonthly = eInstallment + eEnergyCost + (inputs.evInsuranceYear / 12) + (inputs.evMaintYear / 12);

                    // อัปเดตผลลัพธ์
                    setResults({
                        monthlyKm,
                        dieselDownPayment: dDown,
                        dieselFinanceAmt: dFinance,
                        dieselInstallment: dInstallment,
                        dieselEnergyCost: dEnergyCost,
                        dieselTotalMonthly: dTotalMonthly,
                        
                        evDownPayment: eDown,
                        evFinanceAmt: eFinance,
                        evInstallment: eInstallment,
                        evEnergyCost: eEnergyCost,
                        evTotalMonthly: eTotalMonthly,

                        savingPerMonth: dTotalMonthly - eTotalMonthly
                    });
                };
                calc();
            }, [inputs]);

            React.useEffect(() => {
                lucide.createIcons();
            });

            const handleChange = (e) => {
                const { name, value } = e.target;
                setInputs(prev => ({
                    ...prev,
                    [name]: parseFloat(value) || 0
                }));
            };

            const formatMoney = (val) => new Intl.NumberFormat('th-TH', { maximumFractionDigits: 0 }).format(val);
            const formatDec = (val) => new Intl.NumberFormat('th-TH', { maximumFractionDigits: 2, minimumFractionDigits: 2 }).format(val);

            return (
                <div className="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
                    <div className="max-w-7xl mx-auto">
                        
                        {/* Header */}
                        <div className="text-center mb-10">
                            <h1 className="text-3xl md:text-4xl font-extrabold text-slate-800 tracking-tight mb-3">
                                EV Truck: Monthly Cash Flow Calculator
                            </h1>
                            <p className="text-slate-500 text-lg">
                                เครื่องมือเปรียบเทียบภาระค่าใช้จ่าย "รายเดือน" (ค่างวดรถ + ค่าพลังงาน + ค่าบำรุงรักษา)
                            </p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            {/* --- ฝั่งซ้าย: ข้อมูล Input --- */}
                            <div className="lg:col-span-5 space-y-6 overflow-y-auto hide-scroll" style={{maxHeight: '85vh'}}>
                                
                                {/* 1. ข้อมูลการวิ่ง */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                    <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center">
                                        <i data-lucide="route" className="w-5 h-5 mr-2 text-blue-600"></i> ข้อมูลปฏิบัติงาน (Operations)
                                    </h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 mb-1">วิ่งระยะทาง (กม./วัน)</label>
                                            <input type="number" name="kmPerDay" value={inputs.kmPerDay} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 mb-1">วันทำงาน (วัน/เดือน)</label>
                                            <input type="number" name="daysPerMonth" value={inputs.daysPerMonth} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                    </div>
                                    <div className="mt-3 p-3 bg-blue-50 rounded-lg text-sm text-blue-800 font-medium text-center">
                                        ระยะทางรวม: {formatMoney(results.monthlyKm)} กิโลเมตร / เดือน
                                    </div>
                                </div>

                                {/* 2. รถดีเซล */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                    <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center">
                                        <i data-lucide="fuel" className="w-5 h-5 mr-2 text-orange-600"></i> รถบรรทุกเครื่องยนต์ดีเซล (ICE)
                                    </h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">ราคารถรวม (บาท)</label>
                                            <input type="number" name="dieselPrice" value={inputs.dieselPrice} onChange={handleChange} className="w-full px-3 py-2 border border-orange-300 bg-orange-50 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none font-bold" />
                                        </div>
                                        <div className="grid grid-cols-3 gap-3">
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">เงินดาวน์ (%)</label>
                                                <input type="number" name="dieselDownPct" value={inputs.dieselDownPct} onChange={handleChange} className="w-full px-2 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">ดอกเบี้ย (%)</label>
                                                <input type="number" step="0.1" name="dieselInterestRate" value={inputs.dieselInterestRate} onChange={handleChange} className="w-full px-2 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">ระยะเวลา (งวด)</label>
                                                <input type="number" name="dieselTerms" value={inputs.dieselTerms} onChange={handleChange} className="w-full px-2 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-3 border-t border-slate-100">
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">สิ้นเปลือง (กม./ลิตร)</label>
                                                <input type="number" step="0.1" name="dieselConsumption" value={inputs.dieselConsumption} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">ราคาน้ำมัน (บาท/ลิตร)</label>
                                                <input type="number" step="0.1" name="dieselFuelPrice" value={inputs.dieselFuelPrice} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 3. รถไฟฟ้า */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 border-b-4 border-b-green-500">
                                    <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center">
                                        <i data-lucide="zap" className="w-5 h-5 mr-2 text-green-600"></i> รถบรรทุกไฟฟ้า (EV Truck)
                                    </h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">ราคารถรวม (บาท)</label>
                                            <input type="number" name="evPrice" value={inputs.evPrice} onChange={handleChange} className="w-full px-3 py-2 border border-green-300 bg-green-50 rounded-lg focus:ring-2 focus:ring-green-500 outline-none font-bold" />
                                        </div>
                                        <div className="grid grid-cols-3 gap-3">
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">เงินดาวน์ (%)</label>
                                                <input type="number" name="evDownPct" value={inputs.evDownPct} onChange={handleChange} className="w-full px-2 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">ดอกเบี้ย (%)</label>
                                                <input type="number" step="0.1" name="evInterestRate" value={inputs.evInterestRate} onChange={handleChange} className="w-full px-2 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">ระยะเวลา (งวด)</label>
                                                <input type="number" name="evTerms" value={inputs.evTerms} onChange={handleChange} className="w-full px-2 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 pt-3 border-t border-slate-100">
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">สิ้นเปลือง (kWh/กม.)</label>
                                                <input type="number" step="0.01" name="evConsumption" value={inputs.evConsumption} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-slate-600 mb-1">ค่าไฟ (บาท/kWh)</label>
                                                <input type="number" step="0.1" name="evElectricityPrice" value={inputs.evElectricityPrice} onChange={handleChange} className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* --- ฝั่งขวา: ผลลัพธ์ Dashboard --- */}
                            <div className="lg:col-span-7 space-y-6">
                                
                                {/* กล่องสรุปผลประหยัดรวม */}
                                <div className={`rounded-2xl shadow-lg p-6 relative overflow-hidden ${results.savingPerMonth > 0 ? 'bg-gradient-to-r from-emerald-600 to-green-800' : 'bg-gradient-to-r from-slate-700 to-slate-900'} text-white`}>
                                    <div className="relative z-10 flex flex-col md:flex-row justify-between items-center gap-4">
                                        <div>
                                            <p className="text-green-100 text-sm font-medium mb-1">หากเปลี่ยนเป็น EV จะลดภาระค่าใช้จ่ายได้</p>
                                            <div className="flex items-baseline">
                                                <span className="text-4xl md:text-5xl font-extrabold tracking-tight">
                                                    ฿ {formatMoney(Math.abs(results.savingPerMonth))}
                                                </span>
                                                <span className="ml-2 text-lg text-green-100 font-medium">/ เดือน</span>
                                            </div>
                                            {results.savingPerMonth < 0 && <p className="text-red-300 text-xs mt-1">*EV มีค่าใช้จ่ายรายเดือนสูงกว่าดีเซล</p>}
                                        </div>
                                        <div className="bg-white/20 backdrop-blur-md rounded-xl p-4 border border-white/20 text-center w-full md:w-auto">
                                            <p className="text-green-100 text-xs mb-1">รวมประหยัดต่อปี (12 เดือน)</p>
                                            <p className="text-2xl font-bold text-white">฿ {formatMoney(Math.abs(results.savingPerMonth * 12))}</p>
                                        </div>
                                    </div>
                                    <div className="absolute right-0 top-0 w-64 h-64 bg-white opacity-5 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/4"></div>
                                </div>

                                {/* ตารางเปรียบเทียบ Cash Flow แบบเจาะลึก */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-slate-50 border-b border-slate-200 px-6 py-4">
                                        <h3 className="text-lg font-bold text-slate-800">วิเคราะห์กระแสเงินสดรายเดือน (Monthly Cash Flow)</h3>
                                    </div>
                                    
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr>
                                                    <th className="p-4 text-slate-500 font-medium bg-white w-2/5">รายการค่าใช้จ่าย</th>
                                                    <th className="p-4 font-bold text-orange-700 bg-orange-50/50 w-1/4 text-right">รถดีเซล (ICE)</th>
                                                    <th className="p-4 font-bold text-emerald-700 bg-green-50/50 w-1/4 text-right">รถไฟฟ้า (EV)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                
                                                {/* ส่วนไฟแนนซ์ */}
                                                <tr>
                                                    <td className="p-4">
                                                        <div className="font-semibold text-slate-800">1. ค่างวดผ่อนรถ (Installment)</div>
                                                        <div className="text-xs text-slate-500 mt-1">ยอดจัด: ฿{formatMoney(results.dieselFinanceAmt)} vs ฿{formatMoney(results.evFinanceAmt)}</div>
                                                    </td>
                                                    <td className="p-4 text-right font-medium text-slate-700 bg-orange-50/10">฿ {formatMoney(results.dieselInstallment)}</td>
                                                    <td className="p-4 text-right font-medium text-slate-700 bg-green-50/10">฿ {formatMoney(results.evInstallment)}</td>
                                                </tr>

                                                {/* ส่วนพลังงาน */}
                                                <tr>
                                                    <td className="p-4">
                                                        <div className="font-semibold text-slate-800">2. ค่าพลังงาน (Energy Cost)</div>
                                                        <div className="text-xs text-slate-500 mt-1">น้ำมัน {inputs.dieselFuelPrice}บ./L vs ไฟฟ้า {inputs.evElectricityPrice}บ./kWh</div>
                                                    </td>
                                                    <td className="p-4 text-right font-medium text-slate-700 bg-orange-50/10">฿ {formatMoney(results.dieselEnergyCost)}</td>
                                                    <td className="p-4 text-right font-medium text-emerald-600 bg-green-50/10">฿ {formatMoney(results.evEnergyCost)}</td>
                                                </tr>

                                                {/* ส่วนซ่อมบำรุง/ประกัน (หาร 12) */}
                                                <tr>
                                                    <td className="p-4">
                                                        <div className="font-semibold text-slate-800">3. ค่าซ่อมบำรุง & ประกันภัย (เฉลี่ยรายเดือน)</div>
                                                        <div className="text-xs text-slate-500 mt-1">คิดเฉลี่ยจากรายจ่ายรายปี</div>
                                                    </td>
                                                    <td className="p-4 text-right text-sm text-slate-600 bg-orange-50/10">฿ {formatMoney((inputs.dieselMaintYear + inputs.dieselInsuranceYear)/12)}</td>
                                                    <td className="p-4 text-right text-sm text-slate-600 bg-green-50/10">฿ {formatMoney((inputs.evMaintYear + inputs.evInsuranceYear)/12)}</td>
                                                </tr>

                                                {/* สรุปรวมรายเดือน */}
                                                <tr className="border-t-2 border-slate-200">
                                                    <td className="p-4">
                                                        <div className="font-bold text-slate-900 text-lg">รวมค่าใช้จ่ายเฉลี่ยต่อเดือน</div>
                                                    </td>
                                                    <td className="p-4 text-right font-extrabold text-orange-600 text-xl bg-orange-50/30">
                                                        ฿ {formatMoney(results.dieselTotalMonthly)}
                                                    </td>
                                                    <td className="p-4 text-right font-extrabold text-emerald-600 text-xl bg-green-50/30">
                                                        ฿ {formatMoney(results.evTotalMonthly)}
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* แถบข้อมูลน่ารู้ */}
                                <div className="bg-blue-50 rounded-xl p-5 border border-blue-100 flex items-start gap-4">
                                    <div className="bg-blue-100 p-2 rounded-lg text-blue-600">
                                        <i data-lucide="info" className="w-6 h-6"></i>
                                    </div>
                                    <div>
                                        <h4 className="text-sm font-bold text-blue-900 mb-1">ทำไมรถ EV ถึงน่าลงทุนในแง่ Cash Flow?</h4>
                                        <p className="text-sm text-blue-800 leading-relaxed">
                                            แม้ค่างวดรถ EV (Installment) จะสูงกว่ารถดีเซลประมาณ <span className="font-bold">{formatMoney(results.evInstallment - results.dieselInstallment)}</span> บาท/เดือน 
                                            แต่การที่ค่าไฟถูกกว่าค่าน้ำมันมหาศาล ทำให้ช่วยหักล้างส่วนต่างของค่างวดได้ทั้งหมด และยังเหลือเงินทอนกลับเข้ากระเป๋าบริษัทอีกเดือนละ 
                                            <span className="font-bold text-emerald-600"> {formatMoney(results.savingPerMonth)} </span> บาท
                                        </p>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
